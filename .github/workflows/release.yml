name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Lint (glinter, warnings as errors)
        run: gleam run -m glinter

      - name: Build (Erlang, warnings as errors)
        run: gleam build --warnings-as-errors --target erlang

      - name: Build (JavaScript, warnings as errors)
        run: gleam build --warnings-as-errors --target javascript

      - name: Test (Erlang)
        run: gleam test --target erlang

      - name: Test (JavaScript)
        run: gleam test --target javascript

      - name: Build docs
        run: gleam docs build

  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"

      - name: Download dependencies
        run: gleam deps download

      - name: Build package
        run: gleam build

      - name: Publish to Hex
        run: echo 'I am not using semantic versioning' | gleam publish -y
        env:
          HEXPM_API_KEY: ${{ secrets.HEXPM_API_KEY }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.TAG_NAME }}"
          TAG_WITHOUT_V="${TAG#v}"
          CHANGELOG_FILE="changelog_content.md"

          awk -v ver="$TAG_WITHOUT_V" '
            BEGIN { found = 0; }
            $0 ~ "^#{2,3} \\[?" ver "\\]?" { found = 1; next; }
            /^#{2,3} \[?[0-9]+\.[0-9]+\.[0-9]+\]?/ { if (found) exit; }
            found { print; }
          ' CHANGELOG.md > "$CHANGELOG_FILE"

          if [ ! -s "$CHANGELOG_FILE" ]; then
            awk -v ver="$TAG" '
              BEGIN { found = 0; }
              $0 ~ "^#{2,3} \\[?" ver "\\]?" { found = 1; next; }
              /^#{2,3} \[?v?[0-9]+\.[0-9]+\.[0-9]+\]?/ { if (found) exit; }
              found { print; }
            ' CHANGELOG.md > "$CHANGELOG_FILE"
          fi

          if [ ! -s "$CHANGELOG_FILE" ]; then
            echo "No changelog entry found for version $TAG" > "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "Please check CHANGELOG.md for updates." >> "$CHANGELOG_FILE"
          fi

          {
            echo 'CHANGELOG_CONTENT<<EOF'
            cat "$CHANGELOG_FILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          body: |
            ${{ steps.changelog.outputs.CHANGELOG_CONTENT }}

            ## Install

            ```sh
            gleam add geokit
            ```

            See [HexDocs](https://hexdocs.pm/geokit) for the API
            reference.
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG_NAME, '-alpha') || contains(steps.tag.outputs.TAG_NAME, '-beta') || contains(steps.tag.outputs.TAG_NAME, '-rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
