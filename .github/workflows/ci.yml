name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Format / Lint / Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Lint (glinter, warnings as errors)
        run: gleam run -m glinter

  build-and-test:
    name: Build and test (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [erlang, javascript]
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure git line endings (Windows)
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf input
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - name: Set up Node.js
        if: matrix.target == 'javascript'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download dependencies
        run: gleam deps download

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors --target ${{ matrix.target }}

      - name: Test
        run: gleam test --target ${{ matrix.target }}
